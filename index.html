<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dare Devil's Oracle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;300;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        canvas {
            touch-action: none;
        }

        .glass-window {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="overflow-hidden text-white">
    <div id="ui-layer" class="absolute inset-0 z-10 flex flex-col items-center justify-between p-8 pointer-events-none">
        <h1 class="text-xs uppercase tracking-[0.5em] font-thin opacity-50">The Risk-Taker's Oracle</h1>

        <!-- The Result Window (Hidden initially) -->
        <div id="oracle-window"
            class="glass-window p-6 rounded-full w-64 h-64 flex flex-col items-center justify-center text-center opacity-0 transition-opacity duration-1000 border border-white/10">
            <p id="fate-text" class="text-sm font-bold uppercase mb-4 text-cyan-400"></p>
            <p id="dare-text" class="text-[10px] leading-relaxed font-light italic"></p>
        </div>

        <div class="w-full max-w-md pointer-events-auto">
            <input id="question-input" type="text" placeholder="ASK YOUR DESTINY..."
                class="w-full bg-transparent border-b border-white/20 p-4 text-center focus:outline-none focus:border-cyan-500 transition-colors placeholder:opacity-30 uppercase tracking-widest text-sm">
        </div>
    </div>

    <div id="canvas-container" class="absolute inset-0 z-0"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
